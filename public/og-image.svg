<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Plinko">
  <defs>
    <radialGradient id="bg" cx="20%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#16203a"/>
      <stop offset="55%" stop-color="#0b0e16"/>
      <stop offset="100%" stop-color="#0b0e16"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe39a"/>
      <stop offset="100%" stop-color="#ffd34d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- peg triangle motif -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="930" cy="150" r="7"/>
    <circle cx="900" cy="200" r="7"/><circle cx="960" cy="200" r="7"/>
    <circle cx="870" cy="250" r="7"/><circle cx="930" cy="250" r="7"/><circle cx="990" cy="250" r="7"/>
    <circle cx="840" cy="300" r="7"/><circle cx="900" cy="300" r="7"/><circle cx="960" cy="300" r="7"/><circle cx="1020" cy="300" r="7"/>
    <circle cx="810" cy="350" r="7"/><circle cx="870" cy="350" r="7"/><circle cx="930" cy="350" r="7"/><circle cx="990" cy="350" r="7"/><circle cx="1050" cy="350" r="7"/>
  </g>
  <circle cx="930" cy="120" r="14" fill="url(#gold)"/>

  <text x="90" y="300" font-family="'Space Grotesk', sans-serif" font-size="120" font-weight="700" fill="url(#gold)">Plinko</text>
  <text x="94" y="370" font-family="'Inter', sans-serif" font-size="36" font-weight="500" fill="#8b94a9">Provably-fair · win up to 1000×</text>
  <text x="94" y="430" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#5e667b">Players · history · leaderboard</text>
</svg>
